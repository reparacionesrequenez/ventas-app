<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ventas App </title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand"> Ventas App </div>
    <h1>Iniciar sesión</h1>
    <p class="subtext">Accede con tu correo y contraseña para entrar al panel de ventas.</p>

    <div id="mensaje" class="mensaje"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" onclick="login()">Entrar al sistema</button>

    <p class="auth-footer">¿No tienes cuenta? <a href="Registro.html">Regístrate aquí</a></p>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
