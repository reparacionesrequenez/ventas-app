<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Ventas App Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand"> Ventas App Pro</div>
    <h1>Crear cuenta</h1>
    <p class="subtext">Registra un usuario nuevo para acceder al sistema de ventas.</p>

    <div id="mensaje" class="mensaje"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>

    <button class="btn-primary" onclick="registrar()">Registrar usuario</button>

    <p class="auth-footer">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
